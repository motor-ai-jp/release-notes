name: Publish Release Notes

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

env:
  SOURCE_REPO: motor-ai-jp/MotorAIClientInstaller

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Fetch releases from source repo
        env:
          GH_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
        run: |
          mkdir -p _site
          gh api "repos/${{ env.SOURCE_REPO }}/releases" --paginate \
            | jq '[.[] | select(.draft==false and .prerelease==false)
                   | {tag_name, name, published_at, body}]' \
            > _site/releases.json

      - name: Render HTML
        env:
          REPO_NAME: ${{ env.SOURCE_REPO }}
        run: node scripts/render-release-notes.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
