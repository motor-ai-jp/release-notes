<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>Release Notes - <!-- REPO_NAME --></title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      font-family: "Noto Sans JP", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      background: #f2f5f7;
      color: #24292f;
      line-height: 1.6;
    }
    header {
      background: #023761;
      padding: 1.5rem 1rem;
      text-align: center;
    }
    header h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 600;
      color: #fff;
    }
    header p {
      margin: 0.25rem 0 0;
      font-size: 0.875rem;
      color: rgba(255, 255, 255, 0.75);
    }
    main {
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    .release {
      background: #fff;
      border: 1px solid #d1d5da;
      border-radius: 6px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .release-header {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 0.25rem;
    }
    .release-tag {
      font-size: 1.25rem;
      font-weight: 600;
      color: #24292f;
      margin: 0;
    }
    .release-name {
      font-size: 1rem;
      color: #656d76;
    }
    .release-meta {
      font-size: 0.8125rem;
      color: #656d76;
      margin-bottom: 1rem;
    }
    .release-meta a {
      color: #023761;
      text-decoration: none;
    }
    .release-meta a:hover {
      text-decoration: underline;
    }
    .release-body {
      font-size: 0.9375rem;
      line-height: 1.7;
    }
    .release-body h1,
    .release-body h2,
    .release-body h3 {
      margin-top: 1.25rem;
      margin-bottom: 0.5rem;
      font-weight: 600;
      border-bottom: none;
    }
    .release-body h1 { font-size: 1.25rem; }
    .release-body h2 { font-size: 1.125rem; }
    .release-body h3 { font-size: 1rem; }
    .release-body ul, .release-body ol {
      padding-left: 1.5rem;
    }
    .release-body li {
      margin-bottom: 0.25rem;
    }
    .release-body code {
      background: #f0f2f4;
      padding: 0.15em 0.4em;
      border-radius: 3px;
      font-size: 0.875em;
    }
    .release-body pre {
      background: #f0f2f4;
      padding: 1rem;
      border-radius: 6px;
      overflow-x: auto;
    }
    .release-body pre code {
      background: none;
      padding: 0;
    }
    .release-body a {
      color: #023761;
      text-decoration: none;
    }
    .release-body a:hover {
      text-decoration: underline;
    }
    .release-body table {
      border-collapse: collapse;
      width: 100%;
      margin: 0.75rem 0;
    }
    .release-body th, .release-body td {
      border: 1px solid #d1d5da;
      padding: 0.5rem 0.75rem;
      text-align: left;
    }
    .release-body th {
      background: #f0f2f4;
    }
    .empty-message {
      text-align: center;
      color: #656d76;
      padding: 3rem 1rem;
      font-size: 1rem;
    }
    footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.75rem;
      color: #8b949e;
    }
  </style>
</head>
<body>
  <header>
    <h1><!-- REPO_NAME --></h1>
    <p>Release Notes</p>
  </header>
  <main>
    <!-- RELEASES -->
  </main>
  <footer>
    Powered by GitHub Pages
  </footer>
</body>
</html>
